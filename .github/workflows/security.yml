name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

jobs:
  semgrep-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.1"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Semgrep
        run: python3 -m pip install --upgrade semgrep

      - name: Run npm audit (prod deps)
        run: npm run security:audit

      - name: Run Semgrep
        run: npm run security:semgrep
